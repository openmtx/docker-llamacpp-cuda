services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    image: local/llamacpp:latest
    ports:
      - "8000:8000"
    volumes:
      - $HOME/.cache/llm/models:/models
      - ./model.ini:/model.ini:ro
    shm_size: '2gb'
    ulimits:
      memlock:
        soft: -1
        hard: -1
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - GGML_CUDA_FORCE_MMQ=1
      - LLAMA_API_KEY=${LLAMA_API_KEY}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    command: ["llama-server", "--host", "0.0.0.0", "--port", "8000", "--jinja", "--models-preset", "/model.ini"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 300s

networks:
  default:
    name: llamacpp-network

