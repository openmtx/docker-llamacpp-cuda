name: Build and push Docker image

on:
  push:
    branches: [dev]
    paths:
      - 'llama.cpp'
      - 'Dockerfile'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Extract llama.cpp release tag
        run: |
          set -e
          # The submodule is checked out shallowly (no tags), so we can't use
          # `git describe`. Instead, look up which tag points at the pinned commit
          # via ref advertisement only (no object fetch).
          SUB_HEAD=$(git -C llama.cpp rev-parse HEAD)
          TAG=$(git -C llama.cpp ls-remote --tags origin \
                | grep -F "$SUB_HEAD" \
                | sed -e 's#.*refs/tags/##' -e 's#\^{}$##' \
                | sort -u | head -n1)
          if [ -z "$TAG" ]; then
            echo "::error::No llama.cpp tag found for submodule commit $SUB_HEAD"
            exit 1
          fi
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "Using llama.cpp tag: $TAG"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/openmtx/llamacpp-cuda:${{ env.TAG }}
            ghcr.io/openmtx/llamacpp-cuda:latest
