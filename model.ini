# Usage: llama-server --models-preset /models.ini

[gemma4-12b-hauhaucs]
model = /models/Gemma4-12B-QAT-Uncensored-HauhauCS-Balanced-Q4_K_M.gguf

# Vision (mmproj)
mmproj = /models/mmproj-Gemma4-12B-QAT-Uncensored-HauhauCS-Balanced-BF16.gguf

# Speculative decoding (MTP) — ~60% speedup
spec-draft-model = /models/mtp-gemma-4-12B-it.gguf
spec-type = draft-mtp
spec-draft-n-max = 2

# Memory / I/O
no-mmap = true
mlock = true

# KV cache (Q8)
cache-type-k = q8_0
cache-type-v = q8_0
kv-unified = false

# Context (native 256K)
ctx-size = 262144
fit = false

# GPU
main-gpu = 0
n-gpu-layers = 99
tensor-split = 50,50
flash-attn = on
batch-size = 2048
ubatch-size = 256

# Server — 4 parallel slots
parallel = 4
timeout = 1200
jinja = on
no-prefill-assistant = true
reasoning = off
load-on-startup = true

# Sampling (tuned for this release)
temp = 0.6
top-k = 64
top-p = 0.9
min-p = 0.05
repeat-penalty = 1.1
