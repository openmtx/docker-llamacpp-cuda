# Usage: llama-server --models-preset /models.ini
# Tuned per reddit u/Proper_Doughnut_1324 (P4000+P5000 → 60 t/s)

[qwen3.6-35b-a3b]
model = /models/Qwen3.6-35B-A3B-UD-Q4_K_XL.gguf

# Speculative decoding (requires model with MTP heads)
spec-type = draft-mtp
spec-draft-n-max = 2

# Memory / I/O
no-mmap = true
mlock = true
direct-io = false

# KV cache (q8_0 for better quality with 2×16GB)
cache-type-k = q8_0
cache-type-v = q8_0
kv-unified = true

# Context & fit
ctx-size = 131072
fit = true
fit-target = 256

# GPU
main-gpu = 0
n-gpu-layers = 99
tensor-split = 48,52
flash-attn = on
batch-size = 512
ubatch-size = 64

# Server
parallel = 1
timeout = 1200
jinja = on
no-prefill-assistant = true
reasoning = off
load-on-startup = true

# Sampling
temp = 0.6
top-p = 0.95
top-k = 20
min-p = 0.00
repeat-penalty = 1.15

