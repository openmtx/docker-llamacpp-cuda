# Usage: llama-server --models-preset /models.ini

[gemma4-12b]
model = /models/gemma-4-12B-it-qat-UD-Q4_K_XL.gguf

# Memory / I/O
no-mmap = true
mlock = true

# KV cache (Q8)
cache-type-k = q8_0
cache-type-v = q8_0
kv-unified = false

# Context
ctx-size = 393216
fit = false

# GPU — Balanced split with larger batches
main-gpu = 0
n-gpu-layers = 99
tensor-split = 50,50
flash-attn = on
batch-size = 2048
ubatch-size = 256

# Server — 4 parallel slots
parallel = 4
timeout = 1200
jinja = on
no-prefill-assistant = true
reasoning = off
load-on-startup = true

# Sampling
temp = 0.6
top-p = 0.95
top-k = 20
min-p = 0.00
repeat-penalty = 1.15
